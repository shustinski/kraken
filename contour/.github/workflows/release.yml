name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-installer:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag.StartsWith("v")) { $tag = $tag.Substring(1) }
          "version=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,build]"

      - name: Verify package version matches tag
        shell: pwsh
        run: |
          $pkg = python -c "from polygon_widget.__version__ import __version__; print(__version__)"
          $tag = "${{ steps.version.outputs.version }}"
          if ($pkg -ne $tag) {
            Write-Error "Package version ($pkg) does not match tag ($tag). Bump polygon_widget/__version__.py before tagging."
            exit 1
          }

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Build PyInstaller bundle
        run: pyinstaller packaging/ViaLaNetPolygonWidget.spec --clean --noconfirm

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=${{ steps.version.outputs.version }}" packaging/ViaLaNetPolygonWidget.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Contour-setup-${{ steps.version.outputs.version }}
          path: packaging/Contour-setup-${{ steps.version.outputs.version }}.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Contour ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: packaging/Contour-setup-${{ steps.version.outputs.version }}.exe
